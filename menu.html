<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse our delicious menu - Cloud Kitchen">
    <title>Menu - Cloud Kitchen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>☁️ CloudKitchen</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="index.html#menu" class="nav-link active">Menu</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
                <li><a href="cart.html" class="nav-link">🛒 Cart</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Menu Section -->
    <section class="menu-section">
        <div class="container">
            <h2 class="section-title">📋 Our Menu</h2>
            
            <!-- Filters -->
            <div class="menu-categories">
                <button class="category-btn active" data-category="all">All</button>
                <button class="category-btn" data-category="biryanis">Biryanis</button>
                <button class="category-btn" data-category="curries">Curries</button>
                <button class="category-btn" data-category="tandoori">Tandoori</button>
                <button class="category-btn" data-category="desserts">Desserts</button>
            </div>

            <!-- Menu Items Grid -->
            <div class="menu-grid" id="menuGrid">
                <!-- Menu items will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>CloudKitchen</h4>
                    <p>Delivering happiness, one meal at a time.</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="index.html#menu">Menu</a></li>
                        <li><a href="index.html#featured">Featured</a></li>
                        <li><a href="index.html#contact">Contact</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Follow Us</h4>
                    <div class="social-links">
                        <a href="#">Facebook</a>
                        <a href="#">Twitter</a>
                        <a href="#">Instagram</a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 CloudKitchen. All rights reserved. | Developed by Rameswar555</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
